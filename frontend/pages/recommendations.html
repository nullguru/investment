                              </div>
                              <p class="text-[10px] text-slate-500 -mt-1 mb-1"
                                 x-text="b.currentWeight + '% → ' + b.newWeight + '% of portfolio'"></p>
                            </template>
                          </div>
                        </div>
                        <div class="px-4 py-2 bg-slate-900/50 border-t border-slate-700 text-[10px] text-slate-400 flex justify-between">
                          <span x-text="scenario.buys.length + ' buy action' + (scenario.buys.length !== 1 ? 's' : '')"></span>
                          <span x-text="scenario.sells.length + ' sell action' + (scenario.sells.length !== 1 ? 's' : '')"></span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </section>

          </div>
        </template>

      </div><!-- /advisor -->
