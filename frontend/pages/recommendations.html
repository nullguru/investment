      <!-- ⬡ Recommendations -->
      <div x-show="page === 'recommendations'" x-cloak class="space-y-6">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-100">⬡ Recommendations</h1>
            <p class="text-xs text-slate-400 mt-0.5">Consolidated portfolio snapshot &amp; allocation guidance</p>
          </div>
          <div class="flex items-center gap-3">
            <span x-show="portfolioPricesLoading || mfLoading" class="text-xs text-slate-400 animate-pulse">Loading prices…</span>
            <button @click="fetchPortfolioPrices(); fetchMfHoldings(); fetchUsdInrRate();"
                    class="px-3 py-1.5 rounded-lg border border-slate-600 text-xs text-slate-300 hover:bg-slate-700 transition">↻ Refresh</button>
          </div>
        </div>

        <template x-if="advisorData().hasData">
          <div class="space-y-5">

            <!-- ① Total Wealth -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl border border-slate-700 p-6 text-white">
              <p class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Total Wealth (INR)</p>
              <p class="text-3xl font-bold" x-text="'₹' + advisorData().totalINR.toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
              <div class="flex flex-wrap gap-6 mt-4 text-sm">
                <div>
                  <p class="text-slate-400 text-xs">🇮🇳 IN Stocks</p>
                  <p class="font-semibold" x-text="'₹' + advisorData().inStocksINR.toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
                  <p class="text-xs mt-0.5" x-show="advisorData().inPnL != null"
                     :class="advisorData().inPnL >= 0 ? 'text-emerald-400' : 'text-red-400'"
                     x-text="(advisorData().inPnL >= 0 ? '+' : '') + (advisorData().inPnLPct||0).toFixed(1) + '%'"></p>
                </div>
                <div>
                  <p class="text-slate-400 text-xs">🇺🇸 US Stocks</p>
                  <p class="font-semibold" x-text="'$' + advisorData().usStocksUSD.toLocaleString(undefined,{maximumFractionDigits:0}) + ' · ₹' + advisorData().usStocksINR.toLocaleString('en-IN',{maximumFractionDigits:0})"></p>
                  <p class="text-xs mt-0.5" x-show="advisorData().usPnLINR != null"
                     :class="advisorData().usPnLINR >= 0 ? 'text-emerald-400' : 'text-red-400'"
                     x-text="(advisorData().usPnLINR >= 0 ? '+' : '') + (advisorData().usPnLPct||0).toFixed(1) + '% (INR basis)'"></p>
                </div>
                <div>
                  <p class="text-slate-400 text-xs">Mutual Fund</p>
                  <p class="font-semibold" x-text="'₹' + advisorData().mfINR.toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
                  <p class="text-xs mt-0.5" x-show="advisorData().mfPnL != null"
                     :class="advisorData().mfPnL >= 0 ? 'text-emerald-400' : 'text-red-400'"
                     x-text="(advisorData().mfPnL >= 0 ? '+' : '') + (advisorData().mfPnLPct||0).toFixed(1) + '%'"></p>
                </div>
                <div x-show="advisorData().totalPnL != null">
                  <p class="text-slate-400 text-xs">Total P&amp;L</p>
                  <p class="font-semibold" :class="advisorData().totalPnL >= 0 ? 'text-emerald-400' : 'text-red-400'"
                     x-text="(advisorData().totalPnL >= 0 ? '+' : '') + '₹' + Math.abs(advisorData().totalPnL||0).toLocaleString('en-IN',{maximumFractionDigits:0}) + ' (' + (advisorData().totalPnLPct||0).toFixed(1) + '%)'"></p>
                </div>
              </div>
              <p class="mt-3 text-xs text-slate-500">FX rate: <span x-text="'₹' + advisorData().fx.toFixed(2)"></span>/$ · P&amp;L is simple return, not XIRR</p>
            </div>

            <!-- ② Stocks vs MF ratio -->
            <div class="bg-slate-800/40 rounded-2xl border border-slate-700 p-6">
              <div class="flex items-start justify-between mb-4">
                <div>
                  <h2 class="text-base font-semibold text-slate-100">Stocks vs Mutual Fund</h2>
                  <p class="text-xs text-slate-400 mt-0.5">How much of your wealth is in direct equity vs fund</p>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded-full" :class="advisorData().sMfBadge" x-text="advisorData().sMfVerdict"></span>
              </div>
              <div class="mb-4">
                <div class="flex text-xs text-slate-400 justify-between mb-1">
                  <span>Direct Stocks <span class="font-semibold text-slate-200" x-text="advisorData().stocksPct.toFixed(1) + '%'"></span></span>
                  <span>MF <span class="font-semibold text-slate-200" x-text="advisorData().mfPct.toFixed(1) + '%'"></span></span>
                </div>
                <div class="h-3 rounded-full bg-slate-700 overflow-hidden flex">
                  <div class="h-full bg-indigo-500 transition-all duration-500" :style="'width:' + advisorData().stocksPct + '%'"></div>
                  <div class="h-full bg-teal-400 transition-all duration-500" :style="'width:' + advisorData().mfPct + '%'"></div>
                </div>
                <div class="flex gap-4 mt-1.5 text-xs text-slate-500">
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-indigo-500 inline-block"></span> Direct equity</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-teal-400 inline-block"></span> Mutual fund</span>
                  <span class="text-slate-500 ml-auto">Target band: MF 10–30%</span>
                </div>
              </div>
              <div class="rounded-xl p-4" :class="advisorData().sMfBg">
                <p class="text-sm font-medium mb-1" :class="advisorData().sMfColor" x-text="advisorData().sMfSignal"></p>
                <p class="text-xs text-slate-400 leading-relaxed" x-text="advisorData().sMfAction"></p>
              </div>
              <details class="mt-3">
                <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-300 select-none">Why this matters ▾</summary>
                <div class="mt-2 text-xs text-slate-500 space-y-1.5 leading-relaxed border-t border-slate-700 pt-2">
                  <p><strong class="text-slate-400">Expense ratio drag:</strong> MF direct plans cost ~0.5–1% per year. On ₹5L that is ₹2,500–5,000 lost annually — direct equity has no recurring cost beyond brokerage.</p>
                  <p><strong class="text-slate-400">Sharia control:</strong> Fewer than 10 Sharia equity funds exist in India. Direct stocks give you a universe of 50–100+ compliant options with full transparency on each holding.</p>
                  <p><strong class="text-slate-400">When MF wins:</strong> Portfolio under ₹3L, no time to track individual stocks, or you want instant diversification in a sector you haven't researched yet.</p>
                  <p><strong class="text-slate-400">When direct equity wins:</strong> Portfolio above ₹10L, actively tracked, Sharia compliance is a hard constraint — direct equity is more cost-efficient and gives you full conviction in every holding.</p>
                </div>
              </details>
            </div>

            <!-- ③ IN vs US Geographic Mix -->
            <div class="bg-slate-800/40 rounded-2xl border border-slate-700 p-6">
              <div class="flex items-start justify-between mb-4">
                <div>
                  <h2 class="text-base font-semibold text-slate-100">India vs US Geographic Mix</h2>
                  <p class="text-xs text-slate-400 mt-0.5">MF counted as India exposure · target 15–25% USD</p>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded-full" :class="advisorData().iUBadge" x-text="advisorData().iUVerdict"></span>
              </div>
              <div class="mb-4">
                <div class="flex text-xs text-slate-400 justify-between mb-1">
                  <span>🇮🇳 India <span class="font-semibold text-slate-200" x-text="advisorData().inGeo.toFixed(1) + '%'"></span></span>
                  <span>🇺🇸 US <span class="font-semibold text-slate-200" x-text="advisorData().usGeo.toFixed(1) + '%'"></span></span>
                </div>
                <div class="h-3 rounded-full bg-slate-700 overflow-hidden flex">
                  <div class="h-full bg-orange-400 transition-all duration-500" :style="'width:' + advisorData().inGeo + '%'"></div>
                  <div class="h-full bg-blue-500 transition-all duration-500" :style="'width:' + advisorData().usGeo + '%'"></div>
                </div>
                <div class="flex gap-4 mt-1.5 text-xs text-slate-500">
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-400 inline-block"></span> India (IN stocks + MF)</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span> US stocks</span>
                  <span class="text-slate-500 ml-auto">Sweet spot: 15–25% US</span>
                </div>
              </div>
              <div class="rounded-xl p-4" :class="advisorData().iUBg">
                <p class="text-sm font-medium mb-1" :class="advisorData().iUColor" x-text="advisorData().iUSignal"></p>
                <p class="text-xs text-slate-400 leading-relaxed" x-text="advisorData().iUAction"></p>
              </div>
              <details class="mt-3">
                <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-300 select-none">Why geographic diversification matters ▾</summary>
                <div class="mt-2 text-xs text-slate-500 space-y-1.5 leading-relaxed border-t border-slate-700 pt-2">
                  <p><strong class="text-slate-400">INR depreciation is structural:</strong> Rupee has depreciated ₹45→₹85/$ from 2010–2025 (~3.5%/yr). Even 12% Indian stock returns lose 3–4% in real USD terms without a USD hedge.</p>
                  <p><strong class="text-slate-400">Low correlation:</strong> India–US equity correlation ~0.3 — adding US genuinely reduces portfolio volatility, not just currency speculation.</p>
                  <p><strong class="text-slate-400">Sharia alignment:</strong> US tech (ADBE, MSFT, etc.) tends to have low debt and minimal interest revenue — often Sharia-compliant. Verify via Musaffa or Zoya.</p>
                  <p><strong class="text-slate-400">LRS limit:</strong> Indian residents can remit up to $250,000/year. TCS applies above ₹7L — factor into deployment planning.</p>
                  <p><strong class="text-slate-400">Don't over-diversify:</strong> Above 35% US, asymmetric FX risk grows. Rebalance annually.</p>
                </div>
              </details>
            </div>

            <!-- ④ Asset Breakdown -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                <div class="flex items-center justify-between mb-2">
                  <p class="text-xs font-medium text-slate-400 uppercase tracking-wide">🇮🇳 IN Stocks</p>
                  <span class="text-xs font-semibold text-indigo-400" x-text="advisorData().inStocksPct.toFixed(1) + '%'"></span>
                </div>
                <p class="text-lg font-bold text-slate-100" x-text="'₹' + advisorData().inStocksINR.toLocaleString('en-IN',{maximumFractionDigits:0})"></p>
                <p class="text-xs text-slate-500 mt-1" x-text="(personalIndexInputRows||[]).filter(r=>(holdingMarkets||{})[r.symbol]!=='US').length + ' holdings'"></p>
                <template x-if="policyAnalysis">
                  <p class="text-xs mt-2" :class="policyAnalysis.summary.policy_met ? 'text-emerald-400' : 'text-amber-400'"
                     x-text="policyAnalysis.summary.policy_met ? '✓ Policy met' : '⚠ ' + policyAnalysis.gaps.length + ' gap(s)'"></p>
                </template>
              </div>
              <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                <div class="flex items-center justify-between mb-2">
                  <p class="text-xs font-medium text-slate-400 uppercase tracking-wide">🇺🇸 US Stocks</p>
                  <span class="text-xs font-semibold text-blue-400" x-text="advisorData().usGeo.toFixed(1) + '%'"></span>
                </div>
                <p class="text-lg font-bold text-slate-100" x-text="'₹' + advisorData().usStocksINR.toLocaleString('en-IN',{maximumFractionDigits:0})"></p>
                <p class="text-xs text-slate-500 mt-1" x-text="'$' + advisorData().usStocksUSD.toLocaleString(undefined,{maximumFractionDigits:0}) + ' @ ₹' + advisorData().fx.toFixed(0)"></p>
                <p class="text-xs mt-2 text-amber-400">⚠ Verify Sharia via Musaffa</p>
              </div>
              <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                <div class="flex items-center justify-between mb-2">
                  <p class="text-xs font-medium text-slate-400 uppercase tracking-wide">Mutual Fund</p>
                  <span class="text-xs font-semibold text-teal-400" x-text="advisorData().mfPct.toFixed(1) + '%'"></span>
                </div>
                <p class="text-lg font-bold text-slate-100" x-text="'₹' + advisorData().mfINR.toLocaleString('en-IN',{maximumFractionDigits:0})"></p>
                <p class="text-xs text-slate-500 mt-1" x-text="mfHoldings.length + ' folio(s)'"></p>
                <p class="text-xs mt-2" :class="advisorData().mfXirr >= 6 ? 'text-emerald-400' : 'text-amber-400'"
                   x-text="'XIRR: ' + (advisorData().mfXirr||0).toFixed(1) + '% ' + (advisorData().mfXirr >= 6 ? '✓ above CPI' : '⚠ below 6% CPI')"></p>
              </div>
            </div>

            <!-- ⑤ Priority Actions -->
            <div class="bg-slate-800/40 rounded-2xl border border-slate-700 p-6">
              <h2 class="text-base font-semibold text-slate-100 mb-4">Priority Actions</h2>
              <div class="space-y-3">

                <template x-if="policyAnalysis && !policyAnalysis.summary.policy_met">
                  <div class="flex gap-3 p-3 rounded-xl bg-amber-900/20 border border-amber-700/30">
                    <span class="text-lg">🇮🇳</span>
                    <div>
                      <p class="text-sm font-medium text-amber-300">Fill IN stock sector gaps</p>
                      <p class="text-xs text-amber-400/80 mt-0.5"
                         x-text="policyAnalysis.gaps.filter(g=>g.status==='missing').length + ' missing, ' + policyAnalysis.gaps.filter(g=>g.status==='underweight').length + ' underweight sectors. Go to Portfolio → Prescription for candidates.'"></p>
                    </div>
                  </div>
                </template>
                <template x-if="!policyAnalysis && (personalIndexInputRows||[]).length">
                  <div class="flex gap-3 p-3 rounded-xl bg-slate-700/30 border border-slate-600/30">
                    <span class="text-lg">🇮🇳</span>
                    <div>
                      <p class="text-sm font-medium text-slate-300">Run portfolio analysis</p>
                      <p class="text-xs text-slate-500 mt-0.5">Go to Portfolio page to run sector gap analysis for your IN stocks.</p>
                    </div>
                  </div>
                </template>
                <template x-if="policyAnalysis && policyAnalysis.summary.policy_met">
                  <div class="flex gap-3 p-3 rounded-xl bg-emerald-900/20 border border-emerald-700/30">
                    <span class="text-lg">🇮🇳</span>
                    <div>
                      <p class="text-sm font-medium text-emerald-300">IN stocks policy met ✓</p>
                      <p class="text-xs text-emerald-400/80 mt-0.5"
                         x-text="policyAnalysis.summary.stock_count + ' stocks, ' + policyAnalysis.summary.sector_count + ' sectors — no action needed'"></p>
                    </div>
                  </div>
                </template>

                <div class="flex gap-3 p-3 rounded-xl border" :class="advisorData().iUBg + ' ' + advisorData().iUBorder">
                  <span class="text-lg">🇺🇸</span>
                  <div>
                    <p class="text-sm font-medium" :class="advisorData().iUColor" x-text="'US: ' + advisorData().iUVerdict"></p>
                    <p class="text-xs text-slate-400 mt-0.5" x-text="advisorData().iUSignal"></p>
                  </div>
                </div>

                <div class="flex gap-3 p-3 rounded-xl border" :class="advisorData().sMfBg + ' ' + advisorData().sMfBorder">
                  <span class="text-lg">📊</span>
                  <div>
                    <p class="text-sm font-medium" :class="advisorData().sMfColor" x-text="'MF: ' + advisorData().sMfVerdict"></p>
                    <p class="text-xs text-slate-400 mt-0.5" x-text="advisorData().sMfSignal"></p>
                  </div>
                </div>

                <div class="flex gap-3 p-3 rounded-xl border"
                     :class="advisorData().nonSharia === 0 ? 'bg-emerald-900/20 border-emerald-700/30' : 'bg-rose-900/20 border-rose-700/30'">
                  <span class="text-lg">☪</span>
                  <div>
                    <p class="text-sm font-medium"
                       :class="advisorData().nonSharia === 0 ? 'text-emerald-300' : 'text-rose-300'"
                       x-text="advisorData().nonSharia === 0 ? 'Sharia compliant ✓' : advisorData().nonSharia + ' non-compliant holding(s)'"></p>
                    <p class="text-xs mt-0.5"
                       :class="advisorData().nonSharia === 0 ? 'text-emerald-400/80' : 'text-rose-400/80'"
                       x-text="advisorData().nonSharia === 0 ? 'All screened holdings are compliant. US stocks: verify independently via Musaffa or Zoya.' : 'Review Portfolio → Prescription to find Sharia-compliant replacements.'"></p>
                  </div>
                </div>

              </div>
            </div>

          </div><!-- /hasData -->
        </template>

        <!-- Empty state -->
        <template x-if="!advisorData().hasData">
          <div class="rounded-2xl border-2 border-dashed border-slate-700 p-12 text-center">
            <p class="text-slate-400 text-sm">No portfolio data yet.</p>
            <p class="text-slate-500 text-xs mt-1">Add holdings in the Portfolio page and import MF data to see consolidated advice here.</p>
            <div class="flex gap-3 justify-center mt-4">
              <button @click="go('portfolio')" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm hover:bg-indigo-700">Go to Portfolio</button>
              <button @click="go('mf')" class="px-4 py-2 rounded-lg border border-slate-600 text-sm text-slate-300 hover:bg-slate-700">Go to MF Holdings</button>
            </div>
          </div>
        </template>

      </div><!-- /recommendations -->
