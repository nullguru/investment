      <div x-show="page === 'watchlist'" x-cloak class="space-y-4">
        <div class="flex items-center justify-between">
          <h1 class="text-xl font-semibold text-slate-800">Watchlist</h1>
          <button x-show="watchlistRows.length" @click="columnModalTable = 'watchlist'" class="p-2 rounded-lg text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition" title="Table columns">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </button>
        </div>
        <div class="flex gap-2 items-end">
          <div class="flex-1 max-w-md">
            <label class="block text-xs font-medium text-slate-500 mb-1">Add symbols (comma-separated)</label>
            <input type="text" x-model="watchlistText" @change="saveSettings(); fetchWatchlist()" placeholder="TCS, INFY, RELIANCE" class="rounded-lg border border-slate-200 px-3 py-2 text-sm w-full" />
          </div>
          <button @click="fetchWatchlist()" class="px-4 py-2 rounded-lg bg-teal-600 text-white text-sm hover:bg-teal-700">Update</button>
        </div>
        <div x-show="watchlistRows.length" id="watchlist-table" class="rounded-xl border border-slate-200 overflow-hidden" style="min-height: 300px;"></div>
        <p x-show="page === 'watchlist' && !watchlistRows.length && !loading" class="text-slate-500">Add symbols to track.</p>
      </div>

      <!-- Mobile nav (when sidebar hidden) -->
      <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-2 flex gap-1 overflow-x-auto z-10">
        <template x-for="(label, id) in navCards" :key="id">
          <a :href="'#' + id" @click.prevent="go(id)"
             :class="['flex-shrink-0 px-3 py-2 rounded-lg text-xs font-medium transition', page === id ? 'bg-teal-100 text-teal-700' : 'text-slate-600 hover:bg-slate-100']"
             x-text="label"></a>
        </template>
      </div>
      <div class="h-16 md:hidden"></div>

      <!-- Reusable Column Selection Modal (shared by all tables) -->
      <!-- Column Filter Modal -->
      <div x-show="columnModalTable" x-cloak
           @keydown.escape.window="columnModalTable = null"
           class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4"
           x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
        <!-- Backdrop -->
        <div @click="columnModalTable = null" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

        <!-- Sheet -->
        <div class="relative bg-white dark:bg-slate-900 rounded-t-3xl sm:rounded-2xl shadow-2xl w-full sm:max-w-xl max-h-[92vh] flex flex-col"
             x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-4 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:scale-95">

          <!-- Drag handle (mobile) -->
          <div class="flex justify-center pt-3 pb-1 sm:hidden">
            <div class="w-10 h-1 rounded-full bg-slate-300"></div>
          </div>

          <!-- Header -->
          <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-700">
            <div>
              <h2 class="text-base font-semibold text-slate-800 dark:text-slate-100">Filter Columns</h2>
              <p class="text-xs text-slate-400 mt-0.5">Choose which metrics to show in the table</p>
            </div>
            <div class="flex items-center gap-2">
              <!-- Select all / none -->
              <button @click="columnModalSelectAll(true)"
                class="px-2.5 py-1 rounded-lg text-[11px] font-medium text-teal-700 bg-teal-50 hover:bg-teal-100 transition">All</button>
              <button @click="columnModalSelectAll(false)"
                class="px-2.5 py-1 rounded-lg text-[11px] font-medium text-slate-500 bg-slate-100 hover:bg-slate-200 transition">None</button>
              <button @click="columnModalTable = null"
                class="ml-1 p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          <!-- Grouped columns -->
          <div class="overflow-y-auto flex-1 px-6 py-4 space-y-5">
            <template x-for="group in getColumnGroups(columnModalTable)" :key="group.label">
              <div>
                <!-- Group header -->
                <div class="flex items-center justify-between mb-2">
                  <div class="flex items-center gap-1.5">
                    <span class="text-base leading-none" x-text="group.icon"></span>
                    <span class="text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400" x-text="group.label"></span>
                    <span class="text-[10px] text-slate-400 ml-1"
                          x-text="'(' + group.fields.filter(f => (tableColumns[columnModalTable]||{})[f] !== false).length + '/' + group.fields.length + ')'"></span>
                  </div>
                  <!-- Group toggle -->
                  <button @click="toggleColumnGroup(columnModalTable, group.fields)"
                          :class="columnGroupAllChecked(columnModalTable, group.fields)
                            ? 'text-teal-600 hover:text-teal-800'
                            : 'text-slate-400 hover:text-slate-600'"
                          class="text-[11px] font-medium transition"
                          x-text="columnGroupAllChecked(columnModalTable, group.fields) ? 'Hide all' : 'Show all'">
                  </button>
                </div>

                <!-- Column chips grid -->
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                  <template x-for="field in group.fields" :key="field">
                    <label class="flex items-center gap-2.5 cursor-pointer rounded-xl border px-3 py-2.5 transition select-none"
                           :class="(tableColumns[columnModalTable] || {})[field] !== false
                             ? 'border-teal-300 bg-teal-50 dark:border-teal-700 dark:bg-teal-900/30'
                             : 'border-slate-200 bg-white hover:border-slate-300 dark:border-slate-700 dark:bg-slate-800'">
                      <input type="checkbox"
                             :checked="(tableColumns[columnModalTable] || {})[field] !== false"
                             @change="toggleTableColumn(columnModalTable, field)"
                             class="sr-only" />
                      <!-- Custom check indicator -->
                      <span class="flex-shrink-0 w-4 h-4 rounded flex items-center justify-center transition"
                            :class="(tableColumns[columnModalTable] || {})[field] !== false
                              ? 'bg-teal-500 text-white'
                              : 'bg-slate-200 dark:bg-slate-600'">
                        <svg x-show="(tableColumns[columnModalTable] || {})[field] !== false"
                             class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                        </svg>
                      </span>
                      <span class="text-xs font-medium leading-tight"
                            :class="(tableColumns[columnModalTable] || {})[field] !== false
                              ? 'text-teal-800 dark:text-teal-300'
                              : 'text-slate-600 dark:text-slate-400'"
                            x-text="field.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()).replace('Pct','%').replace('To',' /').replace('And','&')"></span>
                    </label>
                  </template>
                </div>

                <!-- Divider between groups -->
                <div class="mt-5 border-b border-slate-100 dark:border-slate-800 -mx-6"></div>
              </div>
            </template>
          </div>

          <!-- Footer -->
          <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-700 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50 rounded-b-2xl">
            <span class="text-xs text-slate-400"
                  x-text="Object.values(tableColumns[columnModalTable]||{}).filter(v=>v!==false).length + ' of ' + Object.keys(tableColumns[columnModalTable]||{}).length + ' columns visible'"></span>
            <button @click="columnModalTable = null"
                    class="px-5 py-2 rounded-xl bg-teal-600 text-white text-sm font-semibold hover:bg-teal-700 transition shadow-sm">
              Done
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- ═══ Metric Explainer Popover (global, single instance) ═══ -->
    <div x-show="explainer.open"
         x-cloak
         @click.outside="closeExplainer()"
         :style="`position:fixed; left:${Math.min(explainer.x, window.innerWidth - 340)}px; top:${Math.min(explainer.y - scrollY, window.innerHeight - 220)}px; z-index:9999; width:320px`"
         class="rounded-2xl border border-slate-700 bg-slate-900 shadow-2xl text-sm overflow-hidden">
      <div class="flex items-start justify-between px-4 pt-4 pb-2 border-b border-slate-700/60">
        <div>
          <p class="font-semibold text-slate-100 leading-snug" x-text="explainer.content?.title"></p>
          <template x-if="explainer.content?.good">
            <p class="text-[10px] text-teal-400 mt-0.5 font-medium" x-text="explainer.content?.good"></p>
          </template>
        </div>
        <button @click="closeExplainer()" class="text-slate-500 hover:text-slate-300 ml-3 mt-0.5 text-base leading-none shrink-0">✕</button>
      </div>
      <p class="px-4 py-3 text-slate-300 leading-relaxed text-xs" x-text="explainer.content?.body"></p>
    </div>

  </div>
