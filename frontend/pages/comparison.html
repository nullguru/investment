      <div x-show="page === 'comparison'" x-cloak class="space-y-6">

        <!-- Stock picker (up to 5) -->
        <div class="rounded-2xl border border-slate-700 bg-slate-800 p-4">
          <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-3">Compare Stocks <span class="text-slate-600 font-normal normal-case">up to 5</span></p>
          <!-- Selected chips -->
          <div class="flex flex-wrap gap-2 mb-3" x-show="compareSymbols.length">
            <template x-for="(sym, idx) in compareSymbols" :key="sym">
              <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-semibold border"
                    :style="'border-color:' + ['#2dd4bf','#a78bfa','#fbbf24','#fb923c','#ec4899'][idx] + '60; color:' + ['#2dd4bf','#a78bfa','#fbbf24','#fb923c','#ec4899'][idx]">
                <span x-text="sym.replace('.NS','').replace('.BO','')"></span>
                <button @click="removeCompareStock(sym)" class="opacity-60 hover:opacity-100 text-xs leading-none">×</button>
              </span>
            </template>
          </div>
          <!-- Add input -->
          <template x-if="compareSymbols.length < 5">
            <div class="relative" x-data x-on:click.outside="symbolPickerState.compareAdd.open = false">
              <input type="text"
                     x-model="symbolPickerState.compareAdd.query"
                     @focus="symbolPickerState.compareAdd.open = true"
                     @keydown.enter.prevent="(() => { const m = symbolPickerMatches('compareAdd'); if (m.length) addCompareStock(m[0]); symbolPickerState.compareAdd.query = ''; symbolPickerState.compareAdd.open = false; })()"
                     @keydown.escape="symbolPickerState.compareAdd.open = false"
                     @input="symbolPickerState.compareAdd.open = true"
                     :placeholder="compareSymbols.length === 0 ? 'Search and add stocks…' : 'Add another stock…'"
                     class="w-full rounded-xl bg-slate-900 border border-slate-600 text-slate-100 px-3 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500" />
              <div x-show="symbolPickerState.compareAdd.open && symbolPickerState.compareAdd.query.length >= 1"
                   x-transition class="absolute z-30 mt-1 w-full rounded-xl border border-slate-600 bg-slate-800 shadow-xl max-h-52 overflow-y-auto">
                <template x-for="sym in symbolPickerMatches('compareAdd').slice(0, 10)" :key="sym">
                  <button type="button"
                          @click="addCompareStock(sym); symbolPickerState.compareAdd.query = ''; symbolPickerState.compareAdd.open = false"
                          :disabled="compareSymbols.some(s => s.toUpperCase() === sym.toUpperCase())"
                          class="w-full text-left px-3 py-2.5 text-sm hover:bg-slate-700 flex justify-between items-center gap-2 disabled:opacity-40">
                    <span class="font-medium text-slate-100" x-text="sym"></span>
                    <span class="text-slate-400 truncate text-xs" x-text="symbolOptionSecondaryLabel(sym)"></span>
                  </button>
                </template>
                <p x-show="symbolPickerMatches('compareAdd').length === 0" class="px-3 py-2 text-sm text-slate-500">No matches</p>
              </div>
            </div>
          </template>
          <p x-show="compareSymbols.length >= 5" class="text-xs text-slate-500 mt-1">Maximum 5 stocks. Remove one to add another.</p>
        </div>

        <!-- Loading -->
        <div x-show="loading" class="text-center py-8 text-slate-400 text-sm">Loading comparison data…</div>

        <!-- Comparison results (2–5 stocks) -->
        <template x-if="!loading && compareRows.length >= 2">
          <div class="space-y-4" x-data="{ cmpView: 'charts' }">

            <!-- View toggle -->
            <div class="flex gap-2">
              <button @click="cmpView = 'charts'" :class="cmpView === 'charts' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'" class="px-4 py-1.5 rounded-lg text-sm font-medium transition">📊 Charts</button>
              <button @click="cmpView = 'table'" :class="cmpView === 'table' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'" class="px-4 py-1.5 rounded-lg text-sm font-medium transition">⇄ Head-to-Head</button>
            </div>

            <!-- Identity header — dynamic grid based on stock count -->
            <div class="grid rounded-2xl border border-slate-700 overflow-hidden"
                 :style="'grid-template-columns: repeat(' + compareRows.length + ', 1fr)'">
              <template x-for="(row, idx) in compareRows" :key="row.symbol">
                <div class="px-5 py-4"
                     :class="idx < compareRows.length - 1 ? 'border-r border-slate-700' : ''"
                     :style="'background: ' + ['rgba(45,212,191,0.08)','rgba(167,139,250,0.08)','rgba(251,191,36,0.08)','rgba(249,115,22,0.08)','rgba(236,72,153,0.08)'][idx]">
                  <p class="text-lg font-bold"
                     :style="'color: ' + ['#2dd4bf','#a78bfa','#fbbf24','#fb923c','#ec4899'][idx]"
                     x-text="(row.symbol||'').replace('.NS','').replace('.BO','')"></p>
                  <p class="text-xs text-slate-400 mt-0.5 truncate" x-text="row.name || '—'"></p>
                  <p class="text-xs text-slate-500 mt-1 truncate" x-text="row.sector || row.industry || '—'"></p>
                </div>
              </template>
            </div>

            <!-- ── CHARTS VIEW ─────────────────────────────────────── -->
            <div x-show="cmpView === 'charts'" class="space-y-4">
              <!-- Row 1: Radar + Valuation bars -->
              <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4">
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Overall Profile</p>
                  <div class="relative" style="height:260px"><canvas id="cmp-radar"></canvas></div>
                </div>
                <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4">
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Valuation Multiples</p>
                  <div class="relative" style="height:260px"><canvas id="cmp-valuation"></canvas></div>
                </div>
              </div>
              <!-- Row 2: Profitability + Growth -->
              <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4">
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Profitability (%)</p>
                  <div class="relative" style="height:220px"><canvas id="cmp-profit"></canvas></div>
                </div>
                <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4">
                  <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Growth (%)</p>
                  <div class="relative" style="height:220px"><canvas id="cmp-growth"></canvas></div>
                </div>
              </div>
              <!-- Row 3: Financial Health horizontal bars -->
              <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Financial Health &amp; Market</p>
                <div class="relative" style="height:200px"><canvas id="cmp-health"></canvas></div>
              </div>
            </div>

            <!-- ── TABLE / HEAD-TO-HEAD VIEW ───────────────────────── -->
            <div x-show="cmpView === 'table'" class="space-y-4">

              <!-- Metric groups — metric label col + one col per stock -->
              <template x-for="group in compareMetricGroups()" :key="group.label">
                <div class="rounded-2xl border border-slate-700 overflow-hidden">
                  <div class="px-4 py-2 bg-slate-900/60 border-b border-slate-700">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400" x-text="group.label"></span>
                  </div>
                  <template x-for="metric in group.metrics" :key="metric.key">
                    <div class="grid border-b border-slate-800 last:border-0"
                         :style="'grid-template-columns: 180px repeat(' + compareRows.length + ', 1fr)'">
                      <!-- metric label -->
                      <div class="px-4 py-3 bg-slate-900/40 flex items-center border-r border-slate-700">
                        <span class="text-[11px] text-slate-400" x-text="metric.label"></span>
                      </div>
                      <!-- one column per stock -->
                      <template x-for="(row, idx) in compareRows" :key="row.symbol">
                        <div class="px-4 py-3 flex items-center"
                             :class="[
                               idx < compareRows.length - 1 ? 'border-r border-slate-800' : '',
                               compareWinnerIdx(metric, compareRows) === idx ? 'bg-emerald-950/40' : 'bg-slate-800/40'
                             ]">
                          <span class="text-sm font-semibold"
                                :class="compareWinnerIdx(metric, compareRows) === idx ? 'text-emerald-400' : 'text-slate-300'"
                                x-text="compareFormatVal(metric, row)"></span>
                          <span x-show="compareWinnerIdx(metric, compareRows) === idx" class="ml-1.5 text-emerald-500 text-xs">▲</span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Sharia compliance — dynamic grid -->
              <div class="grid gap-4"
                   :style="'grid-template-columns: repeat(' + compareRows.length + ', 1fr)'">
                <template x-for="(row, idx) in compareRows" :key="row.symbol">
                  <div class="rounded-2xl border overflow-hidden"
                       :class="row.Sharia === 'Yes' ? 'border-emerald-700 bg-emerald-950/30' : 'border-rose-800 bg-rose-950/20'">
                    <div class="px-5 py-4">
                      <p class="text-[10px] font-bold uppercase tracking-wider mb-1"
                         :class="row.Sharia === 'Yes' ? 'text-emerald-500' : 'text-rose-500'">Sharia Status</p>
                      <p class="text-xl font-bold"
                         :class="row.Sharia === 'Yes' ? 'text-emerald-400' : 'text-rose-400'"
                         x-text="row.Sharia === 'Yes' ? '✓ Compliant' : (row.Sharia === 'No' ? '✗ Non-Compliant' : '— Unknown')"></p>
                      <div class="mt-3 space-y-1.5 text-xs">
                        <div class="flex justify-between">
                          <span class="text-slate-400">Debt/Equity</span>
                          <span :class="(row.debt_to_equity_ratio||999) <= 0.33 ? 'text-emerald-400' : 'text-rose-400'"
                                x-text="row.debt_to_equity_ratio != null ? row.debt_to_equity_ratio.toFixed(2) : '—'"></span>
                        </div>
                        <div class="flex justify-between">
                          <span class="text-slate-400">Cash/Assets %</span>
                          <span :class="(row.cash_to_assets_pct||999) <= 33 ? 'text-emerald-400' : 'text-rose-400'"
                                x-text="row.cash_to_assets_pct != null ? row.cash_to_assets_pct.toFixed(1)+'%' : '—'"></span>
                        </div>
                        <div class="flex justify-between">
                          <span class="text-slate-400">Non-Halal Rev %</span>
                          <span :class="(row.other_revenue_to_revenue_pct||999) <= 5 ? 'text-emerald-400' : 'text-rose-400'"
                                x-text="row.other_revenue_to_revenue_pct != null ? row.other_revenue_to_revenue_pct.toFixed(2)+'%' : '—'"></span>
                        </div>
                        <div class="flex justify-between">
                          <span class="text-slate-400">Receivables/Assets %</span>
                          <span :class="(row.receivables_to_assets_pct||999) <= 50 ? 'text-emerald-400' : 'text-rose-400'"
                                x-text="row.receivables_to_assets_pct != null ? row.receivables_to_assets_pct.toFixed(1)+'%' : '—'"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

            </div><!-- /cmpView table -->

          </div>
        </template>

        <p x-show="!loading && compareRows.length < 2" class="text-slate-500 text-sm text-center py-8">Select 2–5 stocks above to compare them.</p>
      </div>

      <!-- Portfolio -->
