      <div x-show="page === 'mf'" x-cloak class="space-y-6">

        <!-- Header -->
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 class="text-xl font-semibold text-slate-100">Mutual Fund Holdings</h1>
            <p class="text-xs text-slate-400 mt-0.5">
              Snapshot imported from Groww.
              <span x-show="mfAsOfDate" x-text="'Holdings as on ' + mfAsOfDate" class="text-slate-500"></span>
            </p>
          </div>
          <div class="flex items-center gap-2">
            <button @click="reimportMf()" :disabled="mfImportRunning"
                    class="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium rounded-lg transition border border-slate-600 disabled:opacity-50">
              <span x-show="!mfImportRunning">↻ Re-import</span>
              <span x-show="mfImportRunning">Importing…</span>
            </button>
            <label class="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium rounded-lg transition border border-slate-600 cursor-pointer">
              📂 Upload File
              <input type="file" accept=".xlsx,.xls" class="hidden" @change="handleMfUpload($event)">
            </label>
          </div>
        </div>

        <!-- Error -->
        <div x-show="mfError" class="px-4 py-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm" x-text="mfError"></div>

        <!-- Loading -->
        <div x-show="mfLoading" class="flex items-center justify-center py-16 text-slate-400 text-sm">
          <svg class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
          Loading holdings…
        </div>

        <!-- Summary cards -->
        <div x-show="!mfLoading && mfSummary.total_invested" class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
            <p class="text-xs text-slate-400 mb-1">Total Invested</p>
            <p class="text-lg font-semibold text-slate-100" x-text="'₹' + (mfSummary.total_invested||0).toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
          </div>
          <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
            <p class="text-xs text-slate-400 mb-1">Current Value</p>
            <p class="text-lg font-semibold text-slate-100" x-text="'₹' + (mfSummary.current_value||0).toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
          </div>
          <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
            <p class="text-xs text-slate-400 mb-1">P&amp;L</p>
            <p class="text-lg font-semibold" :class="(mfSummary.profit_loss||0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
               x-text="((mfSummary.profit_loss||0) >= 0 ? '+' : '') + '₹' + Math.abs(mfSummary.profit_loss||0).toLocaleString('en-IN', {maximumFractionDigits:0})"></p>
            <p class="text-xs mt-0.5" :class="(mfSummary.profit_loss_pct||0) >= 0 ? 'text-emerald-500' : 'text-red-500'"
               x-text="((mfSummary.profit_loss_pct||0) >= 0 ? '+' : '') + (mfSummary.profit_loss_pct||0).toFixed(2) + '%'"></p>
          </div>
          <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
            <p class="text-xs text-slate-400 mb-1">XIRR</p>
            <p class="text-lg font-semibold" :class="(mfSummary.xirr_pct||0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
               x-text="((mfSummary.xirr_pct||0) >= 0 ? '+' : '') + (mfSummary.xirr_pct||0).toFixed(2) + '%'"></p>
          </div>
        </div>

        <!-- Holdings table -->
        <div x-show="!mfLoading && mfHoldings.length > 0" class="bg-slate-800/40 border border-slate-700 rounded-xl overflow-hidden">
          <div class="px-5 py-3 border-b border-slate-700">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Holdings</p>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-xs">
              <thead class="bg-slate-800">
                <tr class="text-slate-400 text-left">
                  <th class="px-4 py-2.5 font-medium">Scheme</th>
                  <th class="px-4 py-2.5 font-medium">AMC</th>
                  <th class="px-4 py-2.5 font-medium">Category</th>
                  <th class="px-4 py-2.5 font-medium">Folio</th>
                  <th class="px-4 py-2.5 font-medium text-right">Units</th>
                  <th class="px-4 py-2.5 font-medium text-right">Invested</th>
                  <th class="px-4 py-2.5 font-medium text-right">Current</th>
                  <th class="px-4 py-2.5 font-medium text-right">Returns</th>
                  <th class="px-4 py-2.5 font-medium text-right">XIRR</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="h in mfHoldings" :key="h.folio_no">
                  <tr class="border-t border-slate-800 hover:bg-slate-800/50 transition-colors">
                    <td class="px-4 py-2.5 text-slate-200 max-w-[200px]">
                      <span x-text="h.scheme_name" class="block truncate" :title="h.scheme_name"></span>
                    </td>
                    <td class="px-4 py-2.5 text-slate-400" x-text="h.amc"></td>
                    <td class="px-4 py-2.5">
                      <span class="inline-flex items-center gap-1">
                        <span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-violet-900/50 text-violet-300" x-text="h.category"></span>
                        <span class="text-slate-500" x-text="h.sub_category"></span>
                      </span>
                    </td>
                    <td class="px-4 py-2.5 text-slate-500 font-mono" x-text="h.folio_no"></td>
                    <td class="px-4 py-2.5 text-slate-300 text-right font-mono" x-text="h.units.toFixed(3)"></td>
                    <td class="px-4 py-2.5 text-slate-300 text-right" x-text="'₹' + h.invested_value.toLocaleString('en-IN', {maximumFractionDigits:0})"></td>
                    <td class="px-4 py-2.5 text-right font-medium" x-text="'₹' + h.current_value.toLocaleString('en-IN', {maximumFractionDigits:0})"></td>
                    <td class="px-4 py-2.5 text-right font-medium" :class="h.returns >= 0 ? 'text-emerald-400' : 'text-red-400'"
                        x-text="(h.returns >= 0 ? '+' : '') + '₹' + Math.abs(h.returns).toLocaleString('en-IN', {maximumFractionDigits:0})"></td>
                    <td class="px-4 py-2.5 text-right font-medium" :class="h.xirr_pct >= 0 ? 'text-emerald-400' : 'text-red-400'"
                        x-text="(h.xirr_pct >= 0 ? '+' : '') + h.xirr_pct.toFixed(2) + '%'"></td>
                  </tr>
                </template>
              </tbody>
              <!-- Totals row -->
              <tfoot class="border-t-2 border-slate-600 bg-slate-800/80">
                <tr class="text-slate-300 font-semibold text-xs">
                  <td class="px-4 py-2.5" colspan="4">Total</td>
                  <td class="px-4 py-2.5 text-right font-mono" x-text="mfHoldings.reduce((s,h)=>s+h.units,0).toFixed(3)"></td>
                  <td class="px-4 py-2.5 text-right" x-text="'₹' + mfHoldings.reduce((s,h)=>s+h.invested_value,0).toLocaleString('en-IN',{maximumFractionDigits:0})"></td>
                  <td class="px-4 py-2.5 text-right" x-text="'₹' + mfHoldings.reduce((s,h)=>s+h.current_value,0).toLocaleString('en-IN',{maximumFractionDigits:0})"></td>
                  <td class="px-4 py-2.5 text-right" :class="mfHoldings.reduce((s,h)=>s+h.returns,0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
                      x-text="(mfHoldings.reduce((s,h)=>s+h.returns,0) >= 0 ? '+' : '') + '₹' + Math.abs(mfHoldings.reduce((s,h)=>s+h.returns,0)).toLocaleString('en-IN',{maximumFractionDigits:0})"></td>
                  <td class="px-4 py-2.5"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        <!-- Empty state -->
        <div x-show="!mfLoading && mfHoldings.length === 0 && !mfError"
             class="flex flex-col items-center justify-center py-16 text-slate-500">
          <p class="text-4xl mb-3">📊</p>
          <p class="font-medium text-slate-400">No MF holdings yet</p>
          <p class="text-sm mt-1">Click Re-import or upload a Groww Mutual Funds export</p>
        </div>

      </div><!-- /mf -->
