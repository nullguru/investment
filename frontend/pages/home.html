      <div x-show="page === 'home'" x-cloak class="max-w-4xl mx-auto">
        <!-- Centered search bar -->
        <div class="flex justify-center mb-10">
          <div class="w-full max-w-xl">
            <div class="relative" x-data x-on:click.outside="symbolPickerState.home.open = false">
              <input type="text"
                     x-model="symbolPickerState.home.query"
                     @focus="symbolPickerState.home.open = true"
                     @keydown.enter.prevent="symbolPickerCommit('home')"
                     @keydown.escape="symbolPickerState.home.open = false"
                     placeholder="Search by symbol or company name..."
                     class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 placeholder-slate-400" />
              <div x-show="symbolPickerState.home.open && (symbolPickerState.home.query.length >= 1 || symbolPickerMatches('home').length)"
                   x-transition
                   class="absolute z-20 mt-1 w-full rounded-xl border border-slate-600 bg-slate-800 shadow-xl max-h-60 overflow-y-auto">
                <template x-for="sym in symbolPickerMatches('home').slice(0, 12)" :key="sym">
                  <button type="button"
                          @click="symbolPickerCommit('home', sym)"
                          class="w-full text-left px-4 py-3 text-sm hover:bg-slate-700 flex justify-between items-center gap-2 transition">
                    <span class="font-medium text-slate-100" x-text="sym"></span>
                    <span class="text-slate-400 truncate text-xs" x-text="symbolOptionSecondaryLabel(sym)"></span>
                  </button>
                </template>
                <p x-show="symbolPickerState.home.query.length >= 1 && symbolPickerMatches('home').length === 0" class="px-4 py-3 text-sm text-slate-400">No matches. Press Enter to try the typed symbol.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Metric cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
          <div class="card-glow bg-white rounded-2xl p-6 border border-slate-100 transition">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 text-lg">📊</div>
              <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Analysed</span>
            </div>
            <p class="text-3xl font-bold text-blue-600" x-text="counts.n_with_data ?? '—'"></p>
            <p class="text-xs text-slate-400 mt-1">of <span class="font-semibold text-slate-500" x-text="counts.total_universe ?? '—'"></span> <span x-text="period === 'All periods' ? 'stocks screened (latest)' : 'stocks for ' + period"></span></p>
          </div>
          <div class="card-glow bg-white rounded-2xl p-6 border border-slate-100 transition">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 text-lg">✓</div>
              <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Sharia Compliant</span>
            </div>
            <p class="text-3xl font-bold text-emerald-600" x-text="counts.compliant ?? '—'"></p>
            <p class="text-xs text-slate-400 mt-1">Pass all criteria</p>
          </div>
          <div class="card-glow bg-white rounded-2xl p-6 border border-slate-100 transition">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-xl bg-rose-50 flex items-center justify-center text-rose-600 text-lg">✕</div>
              <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Non-Compliant</span>
            </div>
            <p class="text-3xl font-bold text-rose-600" x-text="counts.non_compliant ?? '—'"></p>
            <p class="text-xs text-slate-400 mt-1">Outside limits</p>
          </div>
          <div class="card-glow bg-white rounded-2xl p-6 border border-slate-100 transition">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center text-amber-600 text-lg">?</div>
              <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Unknown</span>
            </div>
            <p class="text-3xl font-bold text-slate-600" x-text="counts.unknown ?? '—'"></p>
            <p class="text-xs text-slate-400 mt-1">Insufficient data</p>
          </div>
        </div>
        <!-- Compute Sharia (collapsible) -->
        <div x-data="{ open: false }" class="bg-white rounded-2xl border border-slate-200 overflow-hidden card-glow">
          <button @click="open = !open"
                  class="w-full px-6 py-4 text-left font-medium text-slate-700 hover:bg-slate-50 flex justify-between items-center transition">
            <span>Compute Sharia data</span>
            <span class="ml-2 text-xs font-medium text-slate-400"
                  x-show="(counts.never_screened || 0) + (counts.missing_for_period || 0) > 0"
                  x-text="((counts.never_screened || 0) + (counts.missing_for_period || 0)) + ' missing'"></span>
            <span class="text-slate-400" x-text="open ? '▼' : '▶'"></span>
          </button>
          <div x-show="open" x-collapse class="px-6 pb-6 border-t border-slate-100">
            <template x-if="(counts.never_screened || 0) + (counts.missing_for_period || 0) > 0">
              <div class="text-sm text-slate-600 mt-3 space-y-1">
                <p x-show="counts.never_screened > 0">
                  <span class="font-semibold" x-text="counts.never_screened"></span> stocks never screened.
                </p>
                <p x-show="counts.missing_for_period > 0">
                  <span class="font-semibold" x-text="counts.missing_for_period"></span> screened but no data for <span x-text="period"></span>
                  <span class="text-xs text-slate-400">(Yahoo Finance may not have this period's filings yet)</span>
                </p>
                <p class="text-xs text-slate-400">Each compute fetches all available periods from Yahoo Finance. Set N below (0 = all).</p>
              </div>
            </template>
            <p x-show="(counts.never_screened || 0) + (counts.missing_for_period || 0) === 0" class="text-sm text-slate-600 mt-3"
               x-text="'All ' + counts.total_universe + ' stocks screened' + (period === 'All periods' ? '.' : ' for ' + period + '.') + ' Use below to recompute / refresh.'"></p>
            <div class="flex flex-wrap gap-4 mt-4">
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Compute for first N symbols</label>
                <input type="number" x-model.number="computeN" @change="saveSettings()" min="0" class="rounded-lg border border-slate-200 px-3 py-2 w-24 text-sm" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Parallel workers</label>
                <input type="number" x-model.number="computeWorkers" @change="saveSettings()" min="1" max="20" class="rounded-lg border border-slate-200 px-3 py-2 w-20 text-sm" />
              </div>
              <button @click="runCompute()" :disabled="computeRunning"
                      class="self-end px-5 py-2 rounded-lg bg-rose-600 text-white font-medium text-sm hover:bg-rose-700 disabled:opacity-50 transition">
                <span x-text="computeRunning ? 'Computing…' : 'Compute'"></span>
              </button>
            </div>
            <p class="text-xs text-slate-500 mt-2">Lower workers to 3–5 if you see 401 errors.</p>
            <p x-show="computeMessage" class="mt-2 text-sm" :class="computeError ? 'text-rose-600' : 'text-emerald-600'" x-text="computeMessage"></p>
          </div>
        </div>
      </div>
