<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.13.3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 600: '#0f766e', 700: '#0d9488', 800: '#115e59' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <style>
    [x-cloak]{display:none !important}
    body { font-family: 'Inter', system-ui, sans-serif; }
    .sidebar-link.active { background: rgba(15, 118, 110, 0.12); color: #0f766e; border-left: 3px solid #0f766e; }
    .sidebar-link:hover:not(.active) { background: rgba(15, 23, 42, 0.04); }
    .card-glow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05); }
    .card-glow:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.05); }
    .tabulator { font-size: 0.875rem; }
    .tabulator .tabulator-header { background: #f8fafc; border-color: #e2e8f0; }
    .tabulator .tabulator-cell { border-color: #f1f5f9; }
    .tabulator-row.tabulator-row-even { background: #fafafa; }
    .tabulator-row.sharia-compliant-row,
    .tabulator-row.sharia-compliant-row .tabulator-cell { background: #ecfdf5 !important; }

    /* Dark mode overrides */
    html.dark { color-scheme: dark; }
    html.dark body { background-color: #0f172a; color: #e2e8f0; }
    html.dark aside { background-color: #1e293b !important; border-color: #334155 !important; }
    html.dark .sidebar-link { color: #94a3b8; }
    html.dark .sidebar-link.active { background: rgba(45,212,191,0.12); color: #2dd4bf; border-left-color: #2dd4bf; }
    html.dark .sidebar-link:hover:not(.active) { background: rgba(255,255,255,0.05); }
    html.dark .bg-white { background-color: #1e293b !important; }
    html.dark .bg-slate-50 { background-color: #0f172a !important; }
    html.dark .bg-slate-100 { background-color: #1e293b !important; }
    html.dark .bg-slate-200 { background-color: #334155 !important; }
    html.dark .border-slate-100, html.dark .border-slate-200 { border-color: #334155 !important; }
    html.dark .border-slate-300 { border-color: #475569 !important; }
    html.dark .text-slate-900 { color: #f1f5f9 !important; }
    html.dark .text-slate-800 { color: #e2e8f0 !important; }
    html.dark .text-slate-700 { color: #cbd5e1 !important; }
    html.dark .text-slate-600 { color: #94a3b8 !important; }
    html.dark .text-slate-500 { color: #64748b !important; }
    html.dark .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
    html.dark .hover\:bg-slate-100:hover { background-color: #334155 !important; }
    html.dark .hover\:bg-slate-200:hover { background-color: #475569 !important; }
    html.dark .hover\:text-slate-700:hover { color: #cbd5e1 !important; }
    html.dark .bg-white.border-slate-200.rounded-xl { background-color: #1e293b !important; border-color: #334155 !important; }
    html.dark .border-slate-200 { border-color: #334155 !important; }
    html.dark .bg-white.text-slate-500 { background-color: #1e293b !important; color: #94a3b8 !important; }
    html.dark .bg-white.text-slate-500:hover { background-color: #253447 !important; }
    html.dark tbody tr:hover { background-color: #253447 !important; }
    html.dark tbody tr:hover td { color: #e2e8f0 !important; }
    html.dark thead tr { background-color: #0f172a !important; }
    html.dark thead th { color: #94a3b8 !important; }
    html.dark tbody tr { background-color: #1e293b; }
    html.dark tbody tr.divide-y { border-color: #334155 !important; }
    html.dark .divide-y > * { border-color: #334155 !important; }
    html.dark input:not([type="checkbox"]):not([type="radio"]),
    html.dark select, html.dark textarea {
      background-color: #1e293b; border-color: #475569; color: #e2e8f0;
    }
    html.dark input::placeholder, html.dark textarea::placeholder { color: #64748b; }
    html.dark .tabulator { background-color: #1e293b; color: #e2e8f0; border-color: #334155; }
    html.dark .tabulator .tabulator-header { background: #0f172a !important; border-color: #334155; color: #e2e8f0; }
    html.dark .tabulator .tabulator-col { background: #0f172a !important; border-color: #334155 !important; }
    html.dark .tabulator .tabulator-col-title { color: #e2e8f0; }
    html.dark .tabulator .tabulator-cell { border-color: #334155; color: #e2e8f0; }
    html.dark .tabulator-row { background-color: #1e293b !important; }
    html.dark .tabulator-row.tabulator-row-even { background-color: #162032 !important; }
    html.dark .tabulator-row:hover .tabulator-cell { background-color: #253447 !important; }
    html.dark .tabulator-row.sharia-compliant-row,
    html.dark .tabulator-row.sharia-compliant-row .tabulator-cell { background: #064e3b !important; }
    html.dark .tabulator .tabulator-footer { background-color: #0f172a !important; border-color: #334155; color: #e2e8f0; }
    html.dark .tabulator-paginator label, html.dark .tabulator-page { color: #e2e8f0; }
    html.dark .tabulator-page { background-color: #1e293b !important; border-color: #475569 !important; }
    html.dark .tabulator-page.active { background-color: #0f766e !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen" x-data="app()" x-init="init()">
  <!-- Top navbar -->
  <header class="h-14 bg-slate-900 text-white shadow-lg sticky top-0 z-20 flex items-center px-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center font-bold text-sm" x-text="market === 'us' ? '$' : '₹'"></div>
      <span class="font-semibold text-lg tracking-tight">Stock Analysis</span>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button @click="toggleDarkMode()" class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition" :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
      </button>
      <span class="text-xs text-slate-400 hidden md:inline">Market</span>
      <div class="flex items-center rounded-lg border border-slate-600 overflow-hidden text-sm font-medium">
        <button @click="market = 'india'; onMarketChange()"
                :class="market === 'india' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
                class="px-3 py-1.5 transition">🇮🇳</button>
        <button @click="market = 'us'; onMarketChange()"
                :class="market === 'us' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
                class="px-3 py-1.5 transition border-l border-slate-600">🇺🇸</button>
      </div>
      <span class="text-xs text-slate-400 hidden md:inline">Report period</span>
      <select x-model="period" @change="saveSettings(); fetchCounts(); fetchSymbolsMissing(); allStocksRows = []; qualityLoaded = false; portfolioRows = []; onPageChange()"
              class="bg-slate-800 border border-slate-600 rounded-md px-2 py-1.5 text-sm text-white focus:ring-1 focus:ring-teal-500">
        <template x-for="p in reportPeriods" :key="p"><option :value="p" x-text="p"></option></template>
      </select>
    </div>
  </header>

  <div class="flex min-h-[calc(100vh-3.5rem)]">
    <!-- Sidebar -->
    <aside class="w-56 bg-white border-r border-slate-200 flex-shrink-0 hidden md:block">
      <nav class="py-4 space-y-0.5">
        <template x-for="(label, id) in navCards" :key="id">
          <a :href="'#' + id"
             :class="['sidebar-link block px-4 py-2.5 text-sm font-medium text-slate-700 transition', page === id ? 'active' : '']"
             x-text="label"
             @click.prevent="go(id)"></a>
        </template>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto p-6 lg:p-8">
      <!-- Staleness banner -->
      <div x-show="cacheStatus && cacheStatus.sharia && cacheStatus.sharia.stale && !cacheStatusDismissed"
           x-cloak
           class="mb-4 rounded-lg bg-amber-50 border border-amber-200 px-4 py-3 flex items-start gap-3 text-sm max-w-4xl mx-auto">
        <span class="text-amber-500 mt-0.5 flex-shrink-0">&#9888;</span>
        <div class="flex-1">
          <p class="font-medium text-amber-800">Data may be stale</p>
          <p class="text-amber-700 mt-0.5">
            Last refreshed <span x-text="cacheStatus?.sharia?.age_hours ? Math.round(cacheStatus.sharia.age_hours) + 'h ago' : 'unknown'"></span>.
            <span x-text="cacheStatus?.sharia?.symbols_missing ? cacheStatus.sharia.symbols_missing + ' symbols missing.' : ''"></span>
          </p>
          <p class="text-amber-600 mt-1 text-xs">
            Refresh via CLI: <code class="bg-amber-100 px-1 rounded">./cli.py compute sharia --portfolio</code>
            or use the <code class="bg-amber-100 px-1 rounded">investment</code> skill in Claude Code.
          </p>
        </div>
        <button @click="cacheStatusDismissed = true" class="text-amber-400 hover:text-amber-600 text-lg leading-none">&times;</button>
      </div>

      <!-- PAGES_PLACEHOLDER -->

    </main>
  </div>

  <script>
  // APP_JS_PLACEHOLDER
  </script>
</body>
</html>
